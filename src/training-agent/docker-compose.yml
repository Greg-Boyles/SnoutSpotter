services:
  trainer:
    image: ${ECR_REGISTRY:-local}/snout-spotter-training-agent:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - AGENT_NAME=${AGENT_NAME:-}
      - TRAINER_REGISTRATION_URL=${TRAINER_REGISTRATION_URL:-https://dl8b12wn88.execute-api.eu-west-1.amazonaws.com}
    volumes:
      - ./host-state:/app/host-state:rw
      - trainer-state:/app/state
      - trainer-data:/app/data
      - trainer-models:/app/models
      - trainer-ml:/app/ml
      # Dev: uncomment to use local training scripts instead of S3
      # - ../../src/ml:/app/ml:ro
    shm_size: '8gb'
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

volumes:
  trainer-state:
  trainer-data:
  trainer-models:
  trainer-ml:
