name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "src/api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  AWS_REGION: "eu-west-1"
  ECR_REPOSITORY: "snout-spotter-api"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        working-directory: src/api
        run: |
          IMAGE_TAG=${{ github.sha }}
          REGISTRY=${{ steps.ecr-login.outputs.registry }}
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $REGISTRY/$ECR_REPOSITORY:latest .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to App Runner
        run: |
          # Get App Runner service ARN if it exists
          SERVICE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='snout-spotter-api'].ServiceArn" --output text)
          if [ -n "$SERVICE_ARN" ]; then
            aws apprunner start-deployment --service-arn $SERVICE_ARN
          else
            echo "App Runner service not found. Create it via CDK or manually."
            echo "Image pushed to ECR: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"
          fi
