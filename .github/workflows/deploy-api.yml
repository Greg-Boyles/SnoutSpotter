name: Deploy API

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  AWS_REGION: "eu-west-1"
  ECR_REPOSITORY: "snout-spotter-api"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          REGISTRY=${{ steps.ecr-login.outputs.registry }}
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $REGISTRY/$ECR_REPOSITORY:latest src/api
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest

      - name: Publish Lambda projects
        run: |
          dotnet publish src/lambdas/SnoutSpotter.Lambda.IngestClip -c Release
          dotnet publish src/lambdas/SnoutSpotter.Lambda.RunInference -c Release

      - name: Build CDK
        run: dotnet build --configuration Release
        working-directory: src/infra

      - name: CDK deploy API stack
        run: cdk deploy SnoutSpotter-Api --require-approval never
        working-directory: src/infra
