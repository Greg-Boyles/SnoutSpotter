name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/api/**"
      - "src/web/**"
      - "src/lambdas/**"
      - "src/infra/**"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/deploy-*.yml"
      - ".github/workflows/build-*.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # Detect which areas changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      api: ${{ steps.filter.outputs.api }}
      ingest: ${{ steps.filter.outputs.ingest }}
      inference: ${{ steps.filter.outputs.inference }}
      pi-mgmt: ${{ steps.filter.outputs.pi-mgmt }}
      log-ingestion: ${{ steps.filter.outputs.log-ingestion }}
      command-ack: ${{ steps.filter.outputs.command-ack }}
      auto-label: ${{ steps.filter.outputs.auto-label }}
      export-dataset: ${{ steps.filter.outputs.export-dataset }}
      update-training-progress: ${{ steps.filter.outputs.update-training-progress }}
      stats-refresh: ${{ steps.filter.outputs.stats-refresh }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'src/infra/**'
            api:
              - 'src/api/**'
              - 'src/infra/**'
            ingest:
              - 'src/lambdas/SnoutSpotter.Lambda.Ingest/**'
              - 'src/infra/**'
            inference:
              - 'src/lambdas/SnoutSpotter.Lambda.RunInference/**'
              - 'src/infra/**'
            pi-mgmt:
              - 'src/lambdas/SnoutSpotter.Lambda.PiMgmt/**'
              - 'src/infra/**'
            log-ingestion:
              - 'src/lambdas/SnoutSpotter.Lambda.LogIngestion/**'
              - 'src/infra/**'
            command-ack:
              - 'src/lambdas/SnoutSpotter.Lambda.CommandAck/**'
              - 'src/infra/**'
            auto-label:
              - 'src/lambdas/SnoutSpotter.Lambda.AutoLabel/**'
              - 'src/infra/**'
            export-dataset:
              - 'src/lambdas/SnoutSpotter.Lambda.ExportDataset/**'
              - 'src/infra/**'
            update-training-progress:
              - 'src/lambdas/SnoutSpotter.Lambda.UpdateTrainingProgress/**'
              - 'src/infra/**'
            stats-refresh:
              - 'src/lambdas/SnoutSpotter.Lambda.StatsRefresh/**'
              - 'src/infra/**'
            web:
              - 'src/web/**'

  # Stage 1: Deploy infrastructure (only if infra changed)
  stage-1-infra:
    name: Deploy infrastructure
    needs: changes
    if: needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy-infra.yml
    secrets: inherit

  # Stage 2: Build images (each only if relevant source changed)
  build-api-image:
    name: Build API image
    needs: [changes, stage-1-infra]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/build-api-image.yml
    secrets: inherit

  build-ingest-image:
    name: Build ingest image
    needs: [changes, stage-1-infra]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.ingest == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/build-ingest-image.yml
    secrets: inherit

  build-inference-image:
    name: Build inference image
    needs: [changes, stage-1-infra]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.inference == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/build-inference-image.yml
    secrets: inherit

  build-pi-mgmt-image:
    name: Build Pi management image
    needs: [changes, stage-1-infra]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.pi-mgmt == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/build-pi-mgmt-image.yml
    secrets: inherit

  build-log-ingestion-image:
    name: Build log ingestion image
    needs: [changes, stage-1-infra]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.log-ingestion == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/build-log-ingestion-image.yml
    secrets: inherit

  build-auto-label-image:
    name: Build auto-label image
    needs: [changes, stage-1-infra]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.auto-label == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/build-auto-label-image.yml
    secrets: inherit

  build-export-dataset-image:
    name: Build export dataset image
    needs: [changes, stage-1-infra]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.export-dataset == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/build-export-dataset-image.yml
    secrets: inherit

  build-command-ack-image:
    name: Build command ack image
    needs: [changes, stage-1-infra]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.command-ack == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/build-command-ack-image.yml
    secrets: inherit

  build-update-training-progress-image:
    name: Build update-training-progress image
    needs: [changes, stage-1-infra]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.update-training-progress == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/build-update-training-progress-image.yml
    secrets: inherit

  build-stats-refresh-image:
    name: Build stats-refresh image
    needs: [changes, stage-1-infra]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.stats-refresh == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/build-stats-refresh-image.yml
    secrets: inherit

  # Stage 3: Deploy application stacks
  deploy-api:
    name: Deploy API
    needs: build-api-image
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.build-api-image.result == 'success'
    uses: ./.github/workflows/deploy-api.yml
    secrets: inherit

  deploy-ingest:
    name: Deploy ingest
    needs: build-ingest-image
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.build-ingest-image.result == 'success'
    uses: ./.github/workflows/deploy-ingest.yml
    secrets: inherit

  deploy-inference:
    name: Deploy inference
    needs: build-inference-image
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.build-inference-image.result == 'success'
    uses: ./.github/workflows/deploy-inference.yml
    secrets: inherit

  deploy-pi-mgmt:
    name: Deploy Pi management
    needs: build-pi-mgmt-image
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.build-pi-mgmt-image.result == 'success'
    uses: ./.github/workflows/deploy-pi-mgmt.yml
    secrets: inherit

  deploy-log-ingestion:
    name: Deploy log ingestion
    needs: build-log-ingestion-image
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.build-log-ingestion-image.result == 'success'
    uses: ./.github/workflows/deploy-log-ingestion.yml
    secrets: inherit

  deploy-auto-label:
    name: Deploy auto-label
    needs: build-auto-label-image
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.build-auto-label-image.result == 'success'
    uses: ./.github/workflows/deploy-auto-label.yml
    secrets: inherit

  deploy-export-dataset:
    name: Deploy export dataset
    needs: build-export-dataset-image
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.build-export-dataset-image.result == 'success'
    uses: ./.github/workflows/deploy-export-dataset.yml
    secrets: inherit

  deploy-command-ack:
    name: Deploy command ack
    needs: build-command-ack-image
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.build-command-ack-image.result == 'success'
    uses: ./.github/workflows/deploy-command-ack.yml
    secrets: inherit

  deploy-update-training-progress:
    name: Deploy update-training-progress
    needs: build-update-training-progress-image
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.build-update-training-progress-image.result == 'success'
    uses: ./.github/workflows/deploy-update-training-progress.yml
    secrets: inherit

  deploy-stats-refresh:
    name: Deploy stats-refresh Lambda
    needs: build-stats-refresh-image
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.build-stats-refresh-image.result == 'success'
    uses: ./.github/workflows/deploy-stats-refresh.yml
    secrets: inherit

  deploy-web:
    name: Deploy web
    needs: [changes, stage-1-infra]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/deploy-web.yml
    secrets: inherit
