name: Deploy Lambdas

on:
  push:
    branches: [main]
    paths:
      - "src/lambdas/**"
      - ".github/workflows/deploy-lambdas.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  AWS_REGION: "eu-west-1"

jobs:
  deploy-ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Lambda tools
        run: dotnet tool install -g Amazon.Lambda.Tools

      - name: Deploy IngestClip
        working-directory: src/lambdas/SnoutSpotter.Lambda.IngestClip
        run: |
          dotnet lambda deploy-function SnoutSpotter-IngestClip \
            --function-role ${{ secrets.LAMBDA_ROLE_ARN }} \
            --function-handler SnoutSpotter.Lambda.IngestClip::SnoutSpotter.Lambda.IngestClip.Function::FunctionHandler \
            --function-runtime dotnet8 \
            --function-memory-size 512 \
            --function-timeout 120

  deploy-inference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Lambda tools
        run: dotnet tool install -g Amazon.Lambda.Tools

      - name: Deploy RunInference
        working-directory: src/lambdas/SnoutSpotter.Lambda.RunInference
        run: |
          dotnet lambda deploy-function SnoutSpotter-RunInference \
            --function-role ${{ secrets.LAMBDA_ROLE_ARN }} \
            --function-handler SnoutSpotter.Lambda.RunInference::SnoutSpotter.Lambda.RunInference.Function::FunctionHandler \
            --function-runtime dotnet8 \
            --function-memory-size 1024 \
            --function-timeout 120
