name: Build Training Agent image

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "eu-west-1"
  ECR_REPOSITORY: "snout-spotter-training-agent"

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Compute version
        id: version
        run: |
          BUCKET=${{ secrets.DATA_BUCKET_NAME }}
          CURRENT=$(aws s3 cp s3://${BUCKET}/releases/training-agent/manifest.json - 2>/dev/null | jq -r '.version // "1.0.0"' || echo "1.0.0")
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Training agent version: $NEXT (previous: ${CURRENT})"

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          VERSION=${{ steps.version.outputs.version }}
          IMAGE_TAG=${{ github.sha }}
          REGISTRY=${{ steps.ecr-login.outputs.registry }}
          docker build \
            --build-arg AGENT_VERSION=$VERSION \
            -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$ECR_REPOSITORY:v$VERSION \
            -t $REGISTRY/$ECR_REPOSITORY:latest \
            -f src/training-agent/Dockerfile src
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:v$VERSION
          docker push $REGISTRY/$ECR_REPOSITORY:latest

      - name: Update S3 manifest
        run: |
          BUCKET=${{ secrets.DATA_BUCKET_NAME }}
          VERSION=${{ steps.version.outputs.version }}
          echo "{\"version\":\"${VERSION}\",\"imageTag\":\"v${VERSION}\",\"commit\":\"${{ github.sha }}\",\"published_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" | \
            aws s3 cp - s3://${BUCKET}/releases/training-agent/manifest.json --content-type application/json
          echo "Published training-agent manifest v${VERSION}"
