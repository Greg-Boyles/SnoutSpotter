name: Deploy ML models

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      export_yolov8n:
        description: "Export and upload pre-trained YOLOv8n ONNX model for auto-labelling"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "eu-west-1"

jobs:
  package-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Export YOLOv8n to ONNX
        if: ${{ inputs.export_yolov8n || false }}
        run: |
          pip install ultralytics onnx
          python3 -c "
          from ultralytics import YOLO
          model = YOLO('yolov8n.pt')
          model.export(format='onnx', imgsz=640, simplify=True)
          print('Exported yolov8n.onnx')
          "
          ls -lh yolov8n.onnx

      - name: Upload YOLOv8n model to S3
        if: ${{ inputs.export_yolov8n || false }}
        run: |
          BUCKET=${{ secrets.DATA_BUCKET_NAME }}
          echo "Uploading yolov8n.onnx to s3://${BUCKET}/models/yolov8n.onnx"
          aws s3 cp yolov8n.onnx "s3://${BUCKET}/models/yolov8n.onnx"

      - name: Install ML dependencies
        run: |
          if [ -f src/ml/requirements.txt ]; then
            pip install -r src/ml/requirements.txt
          fi

      - name: Package and upload training scripts
        run: |
          BUCKET=${{ secrets.DATA_BUCKET_NAME }}
          if [ -d src/ml ] && [ "$(ls -A src/ml/*.py 2>/dev/null)" ]; then
            cd src/ml
            zip -r ml-training-${{ github.sha }}.zip *.py requirements.txt 2>/dev/null || true
            aws s3 cp ml-training-${{ github.sha }}.zip \
              "s3://${BUCKET}/training-packages/"
            echo "==> Uploaded training package"
          else
            echo "No ML training scripts found, skipping"
          fi

      - name: Upload custom-trained models
        run: |
          BUCKET=${{ secrets.DATA_BUCKET_NAME }}
          if [ -d src/ml/output ]; then
            for model in src/ml/output/*.onnx; do
              [ -f "$model" ] || continue
              name=$(basename "$model")
              echo "Uploading $name to s3://${BUCKET}/models/$name"
              aws s3 cp "$model" "s3://${BUCKET}/models/$name"
            done
          fi

          echo "==> Models in S3:"
          aws s3 ls "s3://${BUCKET}/models/" || echo "  (none)"
